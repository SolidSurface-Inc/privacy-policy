<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap');

    :root {
      --bg: #ffffff;
      --border: #e5e5e5;
      --ink: #222222;
      --ink-muted: #888888;
      --accent: #222222;
      --accent-light: #f5f5f5;
      --sans: 'Noto Sans JP', sans-serif;
      --latin: 'Montserrat', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.9;
      min-height: 100vh;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 0;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--latin);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
    }

    .header-label {
      font-family: var(--latin);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    /* Main */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    /* h1 */
    main h1 {
      font-family: var(--latin);
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--accent);
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    /* h2 */
    main h2 {
      font-family: var(--latin);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 3rem;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    /* h3 */
    main h3 {
      font-family: var(--latin);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 1.75rem;
      margin-bottom: 0.4rem;
    }

    /* p */
    main p {
      font-size: 0.92rem;
      color: var(--ink);
      margin-bottom: 0.8rem;
    }

    /* ul */
    main ul {
      list-style: none;
      margin-bottom: 0.75rem;
      padding-left: 0;
    }

    main ul li {
      font-size: 0.88rem;
      color: var(--ink-muted);
      padding-left: 1.25em;
      position: relative;
      margin-bottom: 0.2rem;
      line-height: 1.7;
    }

    main ul li::before {
      content: '/';
      position: absolute;
      left: 0;
      color: #ccc;
      font-family: var(--latin);
    }

    /* a */
    main a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
    }

    main a:hover {
      border-bottom-color: var(--accent);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }

    footer p {
      font-family: var(--latin);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    footer a {
      color: var(--ink-muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
